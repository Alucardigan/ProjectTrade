name: Gemini PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Gemini Code Review
        uses: sshnaidm/gemini-code-review-action@v2
        with:
          gemini-key: ${{ secrets.GEMINI_API_KEY }}
          model: "gemini-1.5-flash"
          context-lines: 10
          prompt: |
            You are a strict Staff Software Engineer reviewing a Rust codebase. 
            Focus exclusively on:
            - Memory safety and ownership violations.
            - Concurrency issues, deadlocks, and race conditions in financial logic.
            - Algorithmic efficiency.
            Do not nitpick formatting. Point out exact lines where the architecture fails.
